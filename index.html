<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArMess</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --bg2: #ffffff;
            --bg3: #e9e9ef;
            --text: #000000;
            --text2: #6c6c70;
            --text3: #3a3a3c;
            --border: #e0e0e0;
            --border2: #efefef;
            --bubble-mine: #007aff;
            --bubble-other: #e5e5ea;
            --bubble-other-text: #000;
            --header-bg: #ffffff;
            --tab-bg: #ffffff;
            --accent: #007aff;
            --red: #ff3b30;
            --green: #34c759;
            --purple: #5856d6;
            --orange: #ff9f0a;
            --pink: #af52de;
            --unread-bg: #007aff;
        }
        body.dark {
            --bg: #1c1c1e;
            --bg2: #2c2c2e;
            --bg3: #3a3a3c;
            --text: #ffffff;
            --text2: #8e8e93;
            --text3: #ebebf5;
            --border: #3a3a3c;
            --border2: #3a3a3c;
            --bubble-other: #3a3a3c;
            --bubble-other-text: #fff;
            --header-bg: #1c1c1e;
            --tab-bg: #1c1c1e;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; height: 100vh; width: 100%;
            display: flex; justify-content: center; align-items: center;
        }
        .phone {
            width: 100%; max-width: 500px; height: 100%;
            background: var(--bg2);
            border-radius: 28px; overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; position: relative;
        }
        .panel { flex:1; overflow-y:auto; background:var(--bg); display:flex; flex-direction:column; }
        .hidden { display:none !important; }
        .header {
            padding: 12px 16px; background: var(--header-bg);
            border-bottom: 0.5px solid var(--border);
            font-weight: 600; font-size: 20px; color: var(--text);
            display: flex; justify-content: space-between; align-items: center; flex-shrink:0;
        }
        .search-bar {
            padding: 8px 12px; background: var(--header-bg);
            border-bottom: 0.5px solid var(--border); flex-shrink:0;
        }
        .search-bar input {
            width:100%; padding:7px 12px; border-radius:20px;
            border:none; background:var(--bg3); color:var(--text);
            font-size:14px; outline:none;
        }
        .list-item {
            display:flex; align-items:center; gap:12px;
            padding:10px 16px; background:var(--bg2);
            border-bottom:0.5px solid var(--border2);
            cursor:pointer; transition:0.1s; position:relative;
        }
        .list-item:active { background:var(--bg3); }
        .avatar {
            width:44px; height:44px; border-radius:50%;
            background:#8e8e93; display:flex; align-items:center;
            justify-content:center; font-size:22px; flex-shrink:0; position:relative;
        }
        .online-dot {
            position:absolute; bottom:1px; right:1px;
            width:11px; height:11px; border-radius:50%;
            background: var(--green); border:2px solid var(--bg2);
        }
        .unread-badge {
            background: var(--unread-bg); color:white;
            font-size:11px; font-weight:600; border-radius:20px;
            padding:2px 7px; min-width:20px; text-align:center; flex-shrink:0;
        }
        .info { flex:1; min-width:0; }
        .name { font-weight:500; font-size:15px; margin-bottom:2px; color:var(--text); }
        .preview { font-size:12px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .chat-view { display:flex; flex-direction:column; height:100%; background:var(--bg); }
        .chat-header {
            padding:10px 16px; background:var(--header-bg);
            border-bottom:0.5px solid var(--border);
            display:flex; align-items:center; gap:12px; flex-shrink:0;
        }
        .back-btn { font-size:24px; cursor:pointer; color:var(--accent); }
        .chat-name { font-weight:600; font-size:16px; cursor:pointer; color:var(--text); }
        .chat-subtitle { font-size:11px; color:var(--text2); }
        .pinned-bar {
            background: var(--bg2); border-bottom:0.5px solid var(--border);
            padding:6px 14px; font-size:12px; color:var(--text2);
            display:flex; align-items:center; gap:6px; flex-shrink:0; cursor:pointer;
        }
        .messages-area {
            flex:1; overflow-y:auto; padding:12px;
            display:flex; flex-direction:column; gap:4px;
        }
        .date-divider {
            text-align:center; font-size:11px; color:var(--text2);
            margin:8px 0; padding:3px 10px;
            background:var(--bg3); border-radius:20px;
            align-self:center;
        }
        .message { display:flex; flex-direction:column; max-width:85%; position:relative; }
        .message-mine { align-self:flex-end; }
        .message-other { align-self:flex-start; }
        .bubble {
            padding:6px 12px; border-radius:16px;
            font-size:14px; word-wrap:break-word; color:var(--text);
        }
        .message-mine .bubble { background:var(--bubble-mine); color:white; border-bottom-right-radius:3px; }
        .message-other .bubble { background:var(--bubble-other); color:var(--bubble-other-text); border-bottom-left-radius:3px; }
        .reply-preview {
            font-size:11px; padding:4px 8px; border-left:3px solid var(--accent);
            margin-bottom:4px; border-radius:6px; background:rgba(0,122,255,0.1);
            color:var(--text2); max-width:100%; overflow:hidden;
            white-space:nowrap; text-overflow:ellipsis;
        }
        .message-mine .reply-preview { border-left-color:rgba(255,255,255,0.6); background:rgba(255,255,255,0.15); color:rgba(255,255,255,0.8); }
        .msg-name { font-size:10px; font-weight:600; margin-bottom:2px; margin-left:8px; color:var(--accent); }
        .msg-footer { display:flex; align-items:center; gap:4px; margin-top:2px; }
        .msg-time { font-size:9px; color:var(--text2); margin-left:10px; }
        .msg-edited { font-size:9px; color:var(--text2); }
        .reactions-bar { display:flex; gap:4px; flex-wrap:wrap; margin-top:3px; margin-left:8px; }
        .message-mine .reactions-bar { justify-content:flex-end; margin-right:8px; }
        .reaction-chip {
            background:var(--bg3); border:none; border-radius:12px;
            padding:2px 7px; font-size:13px; cursor:pointer; display:flex;
            align-items:center; gap:3px;
        }
        .reaction-chip.mine { background:rgba(0,122,255,0.2); }
        .reaction-chip span { font-size:10px; color:var(--text2); }
        .message-actions { display:flex; gap:4px; margin-top:2px; margin-left:6px; }
        .message-mine .message-actions { justify-content:flex-end; margin-right:6px; }
        .action-btn {
            background:none; border:none; font-size:12px; cursor:pointer;
            padding:2px 5px; border-radius:10px; color:var(--text2);
        }
        .action-btn:hover { background:var(--bg3); }
        .reply-bar {
            background:var(--bg2); padding:8px 14px;
            border-top:0.5px solid var(--border);
            display:flex; align-items:center; gap:8px; flex-shrink:0;
        }
        .reply-bar-text { flex:1; font-size:12px; color:var(--text2); overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
        .reply-bar-close { background:none; border:none; font-size:18px; cursor:pointer; color:var(--text2); }
        .input-bar {
            background:var(--bg2); padding:8px 12px;
            display:flex; gap:8px; border-top:0.5px solid var(--border);
            flex-shrink:0; align-items:center;
        }
        .input-row { display:flex; flex:1; gap:8px; }
        .input-bar input {
            flex:1; padding:8px 12px; border-radius:30px;
            border:none; background:var(--bg3); color:var(--text);
            font-size:14px; outline:none;
        }
        .input-bar button, .sticker-btn {
            background:var(--accent); border:none; color:white;
            width:40px; height:40px; border-radius:30px; font-size:18px; cursor:pointer;
        }
        .sticker-btn { background:var(--green); }
        .sticker-panel {
            display:flex; gap:12px; overflow-x:auto; padding:8px;
            background:var(--bg3); border-top:0.5px solid var(--border);
        }
        .sticker { font-size:28px; cursor:pointer; padding:4px; }
        .tabbar {
            display:flex; background:var(--tab-bg);
            border-top:0.5px solid var(--border);
            padding:6px 16px 8px; justify-content:space-between; flex-shrink:0;
        }
        .tab {
            display:flex; flex-direction:column; align-items:center;
            gap:2px; font-size:10px; color:var(--text2); cursor:pointer; flex:1;
        }
        .tab.active { color:var(--accent); }
        .tab-icon { font-size:20px; }
        .profile-item {
            background:var(--bg2); margin:12px; padding:12px;
            border-radius:20px; display:flex; align-items:center; gap:12px;
        }
        .big-avatar {
            width:52px; height:52px; border-radius:50%; background:var(--accent);
            display:flex; align-items:center; justify-content:center; font-size:26px;
        }
        .edit-btn {
            background:var(--bg3); padding:10px 16px; border-radius:14px;
            font-size:14px; cursor:pointer; text-align:center;
            margin:4px 12px; color:var(--text); border:none; width:calc(100% - 24px);
            display:flex; align-items:center; gap:8px;
        }
        .edit-btn:active { opacity:0.7; }
        .section-header { padding:10px 16px 4px; font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; }
        .session-item {
            background:var(--bg2); margin:4px 12px; padding:10px;
            border-radius:14px; display:flex; justify-content:space-between;
            align-items:center; gap:8px;
        }
        .session-info { font-size:11px; flex:1; word-break:break-word; color:var(--text); }
        .session-kick { background:var(--red); color:white; border:none; padding:5px 12px; border-radius:20px; cursor:pointer; font-size:11px; }
        .notice-board {
            background:var(--bg2); margin:12px; padding:16px;
            border-radius:20px; text-align:center;
        }
        .notice-text {
            font-size:14px; margin:10px 0; white-space:pre-wrap;
            background:var(--bg); padding:10px; border-radius:16px;
            text-align:left; color:var(--text);
        }
        .member-list { background:var(--bg2); margin:12px; padding:12px; border-radius:20px; }
        .member-item {
            display:flex; align-items:center; gap:10px; padding:8px;
            border-bottom:0.5px solid var(--border2);
        }
        .invite-code {
            background:var(--bg3); padding:8px; border-radius:12px;
            font-size:14px; text-align:center; margin:12px 0; font-family:monospace; color:var(--text);
        }
        .group-settings { background:var(--bg2); margin:12px; padding:12px; border-radius:20px; }
        .group-settings input {
            width:100%; padding:8px; margin:6px 0; border-radius:12px;
            border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:14px;
        }
        .scroll-area { flex:1; overflow-y:auto; }
        .channel-post {
            background:var(--bg2); margin:8px 12px; border-radius:16px;
            overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.08);
        }
        .channel-post-header { padding:10px 14px 4px; display:flex; align-items:center; gap:8px; }
        .channel-post-body { padding:4px 14px 10px; font-size:14px; color:var(--text); white-space:pre-wrap; }
        .channel-post-footer { padding:4px 14px 10px; font-size:11px; color:var(--text2); display:flex; align-items:center; gap:8px; }
        .color-swatch { width:28px; height:28px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
        .color-swatch.selected { border-color: var(--text); }
        .typing-indicator { font-size:11px; color:var(--text2); padding:2px 14px 0; height:16px; flex-shrink:0; }
        .search-in-chat {
            padding:8px 12px; background:var(--header-bg);
            border-bottom:0.5px solid var(--border); flex-shrink:0;
        }
        .search-in-chat input {
            width:100%; padding:6px 12px; border-radius:16px;
            border:none; background:var(--bg3); color:var(--text); font-size:13px; outline:none;
        }
        .export-btn { background:var(--bg3); border:none; cursor:pointer; padding:5px 10px; border-radius:10px; font-size:12px; color:var(--text2); }
        .action-log-item { font-size:11px; color:var(--text2); padding:4px 16px; border-bottom:0.5px solid var(--border2); }
    </style>
</head>
<body>
<div class="phone" id="app"></div>
<script>
// ===== ПОЛЬЗОВАТЕЛИ =====
const RAW_USERS = [
    { id:1, name:"Артур", role:"creator", displayName:"Артур", avatar:"👑" },
    { id:2, name:"Маша Петрова", role:"user", displayName:"Маша Петрова", avatar:"🌸" },
    { id:3, name:"Маша Старцева", role:"user", displayName:"Маша Старцева", avatar:"🍒" },
    { id:4, name:"Никифоров Матвей", role:"user", displayName:"Никифоров Матвей", avatar:"⚡" },
    { id:5, name:"Арина Хайдукова", role:"user", displayName:"Арина Хайдукова", avatar:"🎀" },
    { id:6, name:"Городилова Варя", role:"user", displayName:"Городилова Варя", avatar:"🌼" },
    { id:7, name:"Артем Мерзляков", role:"user", displayName:"Артем Мерзляков", avatar:"🎧" },
    { id:8, name:"Вика Батуева", role:"user", displayName:"Вика Батуева", avatar:"🐱" },
    { id:9, name:"Саша Скворцов", role:"user", displayName:"Саша Скворцов", avatar:"💻" },
    { id:10, name:"Кирилл Зяблицев", role:"user", displayName:"Кирилл Зяблицев", avatar:"🎸" },
    { id:11, name:"Попов Тимофей", role:"user", displayName:"Попов Тимофей", avatar:"🏀" },
    { id:12, name:"Ваня", role:"user", displayName:"Ваня", avatar:"🧸" },
    { id:13, name:"Юля Ситнюк", role:"user", displayName:"Юля Ситнюк", avatar:"✨" },
    { id:14, name:"Варя Косякова", role:"user", displayName:"Варя Косякова", avatar:"🦋" },
    { id:15, name:"Рома отличник", role:"user", displayName:"Рома отличник", avatar:"📖" },
    { id:16, name:"Лиля Харламова", role:"user", displayName:"Лиля Харламова", avatar:"🎨" },
    { id:17, name:"Юля Бабушкина", role:"user", displayName:"Юля Бабушкина", avatar:"🍭" },
    { id:18, name:"Кристина", role:"user", displayName:"Кристина", avatar:"💎" },
    { id:19, name:"Саша сычугов", role:"user", displayName:"Саша сычугов", avatar:"⚙️" },
    { id:20, name:"Егор", role:"user", displayName:"Егор", avatar:"🔥" },
    { id:21, name:"Никита Курзов", role:"user", displayName:"Никита Курзов", avatar:"🎮" },
    { id:22, name:"Варя Акулова", role:"user", displayName:"Варя Акулова", avatar:"🐰" },
    { id:23, name:"Диляра", role:"user", displayName:"Диляра", avatar:"🌙" },
    { id:24, name:"Соня Саблина", role:"user", displayName:"Соня Саблина", avatar:"⭐" },
    { id:25, name:"Софа Шляпникова", role:"user", displayName:"Софа Шляпникова", avatar:"👒" },
    { id:26, name:"Наталья Львовна", role:"teacher", displayName:"Наталья Львовна", avatar:"📐" }
];

// ===== СОСТОЯНИЕ =====
let users = JSON.parse(JSON.stringify(RAW_USERS));
let currentUserId = null;
let groupMessages = [];
let privateMessages = {};
let channels = [];    // группы (чаты)
let announcements = []; // каналы (только чтение для участников)
let admins = [1];
let sessions = [];
let currentSessionId = null;
let noticeBoardText = "📢 Школьная доска\nЗдесь будет расписание или важное объявление.";
let readStatus = {}; // {chatKey: lastReadTimestamp}
let actionLog = [];  // лог действий

let activeTab = "chats";
let activeChat = null;
let showSettingsForChannel = null;
let searchQuery = '';
let replyingTo = null;      // {msgId, text, userName}
let chatSearchQuery = '';
let showChatSearch = false;
let darkMode = false;
let typingUsers = {};        // {chatKey: {userId: timestamp}}

const SK = {
    USERS:"armess2_users", GROUP:"armess2_group", PRIVATE:"armess2_private",
    CHANNELS:"armess2_channels", ANNOUNCEMENTS:"armess2_ann", ADMINS:"armess2_admins",
    SESSIONS:"armess2_sessions", NOTICE:"armess2_notice",
    CURRENT_USER:"armess2_current", CURRENT_SESSION:"armess2_session",
    READ:"armess2_read", LOG:"armess2_log", DARK:"armess2_dark", TYPING:"armess2_typing"
};

function saveAll() {
    localStorage.setItem(SK.USERS, JSON.stringify(users));
    localStorage.setItem(SK.GROUP, JSON.stringify(groupMessages));
    localStorage.setItem(SK.PRIVATE, JSON.stringify(privateMessages));
    localStorage.setItem(SK.CHANNELS, JSON.stringify(channels));
    localStorage.setItem(SK.ANNOUNCEMENTS, JSON.stringify(announcements));
    localStorage.setItem(SK.ADMINS, JSON.stringify(admins));
    localStorage.setItem(SK.SESSIONS, JSON.stringify(sessions));
    localStorage.setItem(SK.NOTICE, noticeBoardText);
    localStorage.setItem(SK.READ, JSON.stringify(readStatus));
    localStorage.setItem(SK.LOG, JSON.stringify(actionLog.slice(-200)));
    localStorage.setItem(SK.DARK, darkMode ? '1' : '');
    if(currentUserId) localStorage.setItem(SK.CURRENT_USER, JSON.stringify({id:currentUserId}));
    else localStorage.removeItem(SK.CURRENT_USER);
    if(currentSessionId) localStorage.setItem(SK.CURRENT_SESSION, currentSessionId);
}

function loadAll() {
    users = JSON.parse(localStorage.getItem(SK.USERS) || JSON.stringify(RAW_USERS));
    groupMessages = JSON.parse(localStorage.getItem(SK.GROUP) || JSON.stringify([{id:Date.now(),text:"Добро пожаловать в общий чат!",userId:1,userName:"Артур",timestamp:Date.now()-3600000}]));
    privateMessages = JSON.parse(localStorage.getItem(SK.PRIVATE) || "{}");
    channels = JSON.parse(localStorage.getItem(SK.CHANNELS) || "[]");
    announcements = JSON.parse(localStorage.getItem(SK.ANNOUNCEMENTS) || "[]");
    admins = JSON.parse(localStorage.getItem(SK.ADMINS) || "[1]");
    sessions = JSON.parse(localStorage.getItem(SK.SESSIONS) || "[]");
    noticeBoardText = localStorage.getItem(SK.NOTICE) || "📢 Школьная доска\nЗдесь будет расписание или важное объявление.";
    readStatus = JSON.parse(localStorage.getItem(SK.READ) || "{}");
    actionLog = JSON.parse(localStorage.getItem(SK.LOG) || "[]");
    darkMode = !!localStorage.getItem(SK.DARK);
    if(darkMode) document.body.classList.add('dark');
    const cu = localStorage.getItem(SK.CURRENT_USER);
    if(cu) { try { currentUserId = JSON.parse(cu).id; } catch(e) { currentUserId = null; } }
    currentSessionId = localStorage.getItem(SK.CURRENT_SESSION);
    if(!currentSessionId) { currentSessionId = 'sid_'+Date.now()+'_'+Math.random().toString(36).substr(2,6); }
}

// ===== УТИЛИТЫ =====
let _idc = 0;
function uid() { return Date.now()*1000+(++_idc%1000); }
function esc(s) { if(!s) return ''; return String(s).replace(/[&<>"]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function getUser(id) { return users.find(u=>u.id===id); }
function isAdmin(uid) { return admins.includes(uid)||uid===1; }
function canModify(uid, msgUid) { return uid===msgUid||isAdmin(uid); }
function generateCode() { return Math.floor(100000+Math.random()*900000).toString(); }
function getDeviceInfo() {
    const ua=navigator.userAgent;
    if(/iPhone/i.test(ua)) return 'iPhone';
    if(/iPad/i.test(ua)) return 'iPad';
    if(/Android/i.test(ua)) return 'Android';
    if(/Windows/i.test(ua)) return 'Windows PC';
    if(/Mac/i.test(ua)) return 'Mac';
    return 'Устройство';
}
function addLog(action) {
    actionLog.push({ts:Date.now(), userId:currentUserId, userName:getUser(currentUserId)?.displayName, action});
}
function formatDate(ts) {
    const d = new Date(ts), now = new Date();
    const isToday = d.toDateString()===now.toDateString();
    const isYesterday = new Date(now-86400000).toDateString()===d.toDateString();
    if(isToday) return 'Сегодня';
    if(isYesterday) return 'Вчера';
    return d.toLocaleDateString('ru',{day:'numeric',month:'long'});
}
function formatTime(ts) { return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }

// ===== СЕССИИ И ОНЛАЙН =====
function registerSession() {
    if(!currentUserId) return;
    const ex = sessions.find(s=>s.sessionId===currentSessionId);
    if(ex) { ex.lastSeen=Date.now(); ex.userId=currentUserId; ex.userName=getUser(currentUserId)?.displayName; }
    else { sessions.push({sessionId:currentSessionId,userId:currentUserId,userName:getUser(currentUserId)?.displayName,deviceInfo:getDeviceInfo(),lastSeen:Date.now(),isActive:true}); }
    saveAll();
}
function isOnline(userId) {
    const s = sessions.find(s=>s.userId===userId&&s.isActive);
    return s && (Date.now()-s.lastSeen < 120000);
}
function closeSession(sid) {
    const idx=sessions.findIndex(s=>s.sessionId===sid);
    if(idx!==-1) sessions[idx].isActive=false;
    saveAll();
    if(sid===currentSessionId) { currentUserId=null; saveAll(); }
}

// ===== НЕПРОЧИТАННЫЕ =====
function markRead(chatKey) {
    readStatus[chatKey] = Date.now();
    saveAll();
}
function getUnread(chatKey, messages) {
    const lastRead = readStatus[chatKey] || 0;
    return messages.filter(m=>(m.timestamp||0)>lastRead && (m.userId||m.fromId)!==currentUserId).length;
}

// ===== ПЕЧАТАЕТ =====
function setTyping(chatKey) {
    try {
        let t = JSON.parse(localStorage.getItem(SK.TYPING)||'{}');
        if(!t[chatKey]) t[chatKey]={};
        t[chatKey][currentUserId] = Date.now();
        localStorage.setItem(SK.TYPING, JSON.stringify(t));
    } catch(e){}
}
function getTyping(chatKey) {
    try {
        let t = JSON.parse(localStorage.getItem(SK.TYPING)||'{}');
        const now=Date.now();
        return Object.entries(t[chatKey]||{})
            .filter(([uid,ts])=>now-ts<4000 && parseInt(uid)!==currentUserId)
            .map(([uid])=>getUser(parseInt(uid))?.displayName||'Кто-то');
    } catch(e){ return []; }
}

function deleteGroupMessage(msgId, userId) {

    if(idx!==-1&&canModify(userId,groupMessages[idx].userId)) { addLog(`Удалил сообщение в общем чате`); groupMessages.splice(idx,1); saveAll(); }

function toggleGroupReaction(msgId, emoji) {

    if(idx===-1) m.reactions[emoji].push(currentUserId);

    saveAll();
}

// ===== СООБЩЕНИЯ: ЛИЧНЫЕ =====
function getPrivateChatKey(a, b) { return [Math.min(a,b),Math.max(a,b)].join('_'); }
function getPrivateMessages(a, b) {
    const key=getPrivateChatKey(a,b);
    return (privateMessages[key]||[]).sort((x,y)=>x.timestamp-y.timestamp);
}
function addPrivateMessage(toId, fromId, fromName, text, replyTo=null) {
    if(!text.trim()) return;
    const key=getPrivateChatKey(fromId,toId);
    if(!privateMessages[key]) privateMessages[key]=[];
    privateMessages[key].push({id:uid(),text:text.trim(),fromId,fromName,userId:fromId,userName:fromName,timestamp:Date.now(),replyTo,reactions:{}});
    saveAll();
}
function editPrivateMessage(toId, msgId, newText, userId) {
    const key=getPrivateChatKey(userId,toId);
    const msgs=privateMessages[key];
    if(msgs) { let m=msgs.find(m=>m.id==msgId); if(m&&canModify(userId,m.fromId||m.userId)) { m.text=newText.trim(); m.edited=true; saveAll(); } }
}
function deletePrivateMessage(toId, msgId, userId) {
    const key=getPrivateChatKey(userId,toId);
    const msgs=privateMessages[key];
    if(msgs) { let i=msgs.findIndex(m=>m.id==msgId); if(i!==-1&&canModify(userId,msgs[i].fromId||msgs[i].userId)) { msgs.splice(i,1); saveAll(); } }
}
function togglePrivateReaction(toId, msgId, emoji) {
    const key=getPrivateChatKey(currentUserId,toId);
    const msgs=privateMessages[key];
    if(!msgs) return;
    let m=msgs.find(m=>m.id==msgId);
    if(!m) return;
    if(!m.reactions) m.reactions={};
    if(!m.reactions[emoji]) m.reactions[emoji]=[];
    const idx=m.reactions[emoji].indexOf(currentUserId);
    if(idx===-1) m.reactions[emoji].push(currentUserId);
    else m.reactions[emoji].splice(idx,1);
    if(!m.reactions[emoji].length) delete m.reactions[emoji];
    saveAll();
}

// ===== PIN =====
const DEFAULT_PINS = {};
RAW_USERS.forEach(u=>{DEFAULT_PINS[u.id]='0000';});
function getPins() { try { return JSON.parse(localStorage.getItem('armess2_pins')||JSON.stringify(DEFAULT_PINS)); } catch(e) { return {...DEFAULT_PINS}; } }
function savePins(p) { localStorage.setItem('armess2_pins',JSON.stringify(p)); }
function getFails() { try { return JSON.parse(localStorage.getItem('armess2_fails')||'{}'); } catch(e) { return {}; } }
function saveFails(f) { localStorage.setItem('armess2_fails',JSON.stringify(f)); }
function checkPin(userId, pin) {
    const fails=getFails(), key=String(userId), rec=fails[key]||{count:0,until:0};
    if(rec.until>Date.now()) return {ok:false,locked:true,secs:Math.ceil((rec.until-Date.now())/1000)};
    const pins=getPins();
    if(pins[userId]===pin) { delete fails[key]; saveFails(fails); return {ok:true}; }
    rec.count=(rec.count||0)+1;
    if(rec.count>=5){rec.until=Date.now()+30000;rec.count=0;}
    fails[key]=rec; saveFails(fails);
    return {ok:false,locked:false,attemptsLeft:5-rec.count};
}
function changePin(userId, oldPin, newPin) {
    const pins=getPins();
    if(pins[userId]!==oldPin) return false;
    if(!/^\d{4}$/.test(newPin)) return false;
    pins[userId]=newPin; savePins(pins); return true;
}

// ===== РЕНДЕР СООБЩЕНИЙ =====
function renderMessages(messages, chatKey, chatId, isGroup, channelId=null, pinnedMsgId=null, annId=null) {
    let html='', lastDate='';
    const filtered = chatSearchQuery
        ? messages.filter(m=>m.text&&m.text.toLowerCase().includes(chatSearchQuery.toLowerCase()))
        : messages;

    for(let msg of filtered) {
        const isMine=(msg.userId===currentUserId)||(msg.fromId===currentUserId);
        const senderName=msg.userName||msg.fromName||getUser(msg.userId)?.displayName||'?';
        const msgId=msg.id;
        const canEdit=canModify(currentUserId,msg.userId||msg.fromId);
        const dateStr=formatDate(msg.timestamp);
        if(dateStr!==lastDate) { html+=`<div class="date-divider">${dateStr}</div>`; lastDate=dateStr; }

        // reply preview
        let replyHtml='';
        if(msg.replyTo) {
            replyHtml=`<div class="reply-preview">↩ ${esc(msg.replyTo.userName)}: ${esc(msg.replyTo.text?.slice(0,60))}</div>`;
        }

        // reactions
        let reactHtml='';
        if(msg.reactions&&Object.keys(msg.reactions).length) {
            reactHtml='<div class="reactions-bar">';
            for(let [em,uids] of Object.entries(msg.reactions)) {
                if(!uids.length) continue;
                const mine=uids.includes(currentUserId);
                reactHtml+=`<button class="reaction-chip${mine?' mine':''}" data-react-emoji="${esc(em)}" data-react-msg="${msgId}">${em}<span>${uids.length}</span></button>`;
            }
            reactHtml+='</div>';
        }

        // pinned highlight
        const isPinned=pinnedMsgId==msgId;

        html+=`<div class="message ${isMine?'message-mine':'message-other'}${isPinned?' pinned-msg':''}" data-msg-id="${msgId}" data-chat-id="${esc(String(chatId))}" data-is-group="${isGroup}" data-channel-id="${channelId||''}" data-ann-id="${annId||''}">
            ${!isMine&&isGroup?`<div class="msg-name">${esc(senderName)}</div>`:''}
            ${replyHtml}
            <div class="bubble">${esc(msg.text)}${msg.edited?'<span style="font-size:9px;opacity:0.6;"> (ред.)</span>':''}</div>
            <div class="msg-footer">
                <div class="msg-time">${formatTime(msg.timestamp)}</div>
            </div>
            ${reactHtml}
            <div class="message-actions">
                <button class="action-btn reply-btn" title="Ответить">↩</button>
                <button class="action-btn react-btn" title="Реакция">😊</button>
                ${canEdit?`<button class="action-btn edit-msg" title="Редактировать">✏️</button><button class="action-btn delete-msg" title="Удалить">🗑️</button>`:''}
                ${isAdmin(currentUserId)&&!annId?`<button class="action-btn pin-msg" title="Закрепить">📌</button>`:''}
            </div>
        </div>`;
    }
    return html||'<div style="text-align:center;color:var(--text2);padding:32px;">Нет сообщений</div>';
}

// ===== ЭКСПОРТ =====
function exportChat(messages, title) {
    const lines=[`# Чат: ${title}`, `Экспорт: ${new Date().toLocaleString()}`, ''];
    for(let m of messages) {
        const name=m.userName||m.fromName||getUser(m.userId)?.displayName||'?';
        lines.push(`[${formatDate(m.timestamp)} ${formatTime(m.timestamp)}] ${name}: ${m.text}`);
    }
    const blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`armess_${title.replace(/\s+/g,'_')}.txt`; a.click();
}

            if(isOwner&&!isAnn) settingsHtml+=`<button class="edit-btn" id="saveGroupSettingsBtn" style="background:var(--accent);color:white;margin-top:10px;">✅ Сохранить</button>`;
            settingsHtml+=`<button class="edit-btn" id="closeSettingsBtn" style="margin-top:6px;">Закрыть</button>`;
            settingsHtml+=`</div>`;
        }
    }

    // === Окно чата ===
    let chatScreenHtml='';
    let currentChatId=null, currentMessages=[], isGroupChat=false, currentChannelId=null, currentAnnId=null;

    if(activeChat==='group') {
        currentChatId='group'; isGroupChat=true;
        currentMessages=[...groupMessages].sort((a,b)=>a.timestamp-b.timestamp);
    } else if(activeChat==='teacher') {
        currentChatId='teacher';
        currentMessages=getPrivateMessages(currentUserId,26);
    } else if(activeChat==='private_1') {
        currentChatId='private_1';
        currentMessages=getPrivateMessages(currentUserId,1);
    } else if(activeChat&&activeChat.startsWith('user_')) {
        const uid2=parseInt(activeChat.split('_')[1]);
        currentChatId=uid2;
        currentMessages=getPrivateMessages(currentUserId,uid2);
    } else if(activeChat&&activeChat.startsWith('channel_')) {
        const cid=parseInt(activeChat.split('_')[1]);
        const ch=channels.find(c=>c.id==cid);
        if(ch&&ch.members.includes(currentUserId)) {
            currentChatId=cid; isGroupChat=true; currentChannelId=cid;
            currentMessages=[...ch.messages].sort((a,b)=>a.timestamp-b.timestamp);
        } else activeChat=null;
    } else if(activeChat&&activeChat.startsWith('ann_')) {
        const aid=parseInt(activeChat.split('_')[1]);
        const ann=announcements.find(a=>a.id==aid);
        if(ann&&ann.subscribers.includes(currentUserId)) {
            currentChatId=aid; isGroupChat=true; currentAnnId=aid;
            currentMessages=[...ann.posts].sort((a,b)=>a.timestamp-b.timestamp);
        } else activeChat=null;
    }

    if(activeChat&&currentChatId!==null) {
        let chatTitle='', chatSubtitle='', pinnedMsgId=null;
        const ch=currentChannelId?channels.find(c=>c.id==currentChannelId):null;
        const ann=currentAnnId?announcements.find(a=>a.id==currentAnnId):null;
        if(activeChat==='group') { chatTitle='Общий чат'; chatSubtitle=`${users.length} участников`; }
        else if(activeChat==='teacher') { chatTitle='Наталья Львовна'; chatSubtitle=isOnline(26)?'В сети':''; }
        else if(activeChat==='private_1') { chatTitle='Артур'; chatSubtitle=isOnline(1)?'В сети':''; }
        else if(activeChat.startsWith('user_')) {
            const u=getUser(parseInt(activeChat.split('_')[1]));
            chatTitle=u?.displayName; chatSubtitle=isOnline(u?.id)?'В сети':'';
        }
        else if(ch) { chatTitle=ch.name; chatSubtitle=`${ch.members.length} участн.`; pinnedMsgId=ch.pinnedMsgId; }
        else if(ann) { chatTitle=ann.name; chatSubtitle=`📡 Канал · ${ann.subscribers.length} подписч.`; }

        const chatKey = activeChat==='group'?'group':activeChat.startsWith('channel_')?`ch_${currentChannelId}`:activeChat.startsWith('ann_')?`ann_${currentAnnId}`:activeChat==='teacher'?getPrivateChatKey(currentUserId,26):activeChat==='private_1'?getPrivateChatKey(currentUserId,1):getPrivateChatKey(currentUserId,parseInt(activeChat.split('_')[1]));

        const typingList=getTyping(chatKey);
        const typingText=typingList.length?`${typingList.join(', ')} печатает...`:'';

        let pinnedBar='';
        if(pinnedMsgId) {
            const pm=currentMessages.find(m=>m.id==pinnedMsgId);
            if(pm) pinnedBar=`<div class="pinned-bar" id="pinnedBar">📌 ${esc(pm.text.slice(0,50))}</div>`;
        }

        const canPost=!currentAnnId||(currentAnnId&&(ann?.creatorId===currentUserId||isAdmin(currentUserId)));
        const messagesHtml=renderMessages(currentMessages,chatKey,currentChatId,isGroupChat,currentChannelId,pinnedMsgId,currentAnnId);

        const replyBarHtml=replyingTo?`<div class="reply-bar">
            <div style="font-size:16px;color:var(--accent);">↩</div>
            <div class="reply-bar-text"><b>${esc(replyingTo.userName)}</b>: ${esc(replyingTo.text?.slice(0,60))}</div>
            <button class="reply-bar-close" id="cancelReplyBtn">✕</button>
        </div>`:'';

        const searchBarHtml=showChatSearch?`<div class="search-in-chat"><input id="chatSearchInput2" placeholder="🔍 Поиск в чате..." value="${esc(chatSearchQuery)}"></div>`:'';

        chatScreenHtml=`<div class="chat-view">
            <div class="chat-header">
                <div class="back-btn" id="closeChatBtn">←</div>
                <div style="flex:1;cursor:pointer;" id="chatNameBtn">
                    <div class="chat-name">${esc(chatTitle)}</div>
                    ${chatSubtitle?`<div class="chat-subtitle">${esc(chatSubtitle)}</div>`:''}
                </div>
                <button class="action-btn" id="searchInChatBtn" title="Поиск">🔍</button>
                ${!currentAnnId&&currentMessages.length?`<button class="export-btn" id="exportChatBtn">💾</button>`:''}
                ${currentChannelId?`<button class="action-btn" id="showGroupInfoBtn">👥</button>`:''}
                ${currentAnnId?`<button class="action-btn" id="showGroupInfoBtn">ℹ️</button>`:''}
            </div>
            ${pinnedBar}
            ${searchBarHtml}
            <div class="typing-indicator" id="typingIndicator">${esc(typingText)}</div>
            <div class="messages-area" id="chatMessagesArea">${messagesHtml}</div>
            ${replyBarHtml}
            ${canPost?`<div class="input-bar">
                <div class="input-row">
                    <input type="text" id="chatInput" placeholder="Сообщение...">
                    <button id="sendChatBtn">➤</button>
                </div>
                <button class="sticker-btn" id="stickerBtn">😊</button>
            </div>
            <div id="stickerPanel" class="sticker-panel" style="display:none;">
                <span class="sticker">😀</span><span class="sticker">😂</span><span class="sticker">❤️</span><span class="sticker">🔥</span><span class="sticker">🎉</span><span class="sticker">👍</span><span class="sticker">😎</span><span class="sticker">🍕</span><span class="sticker">🎸</span><span class="sticker">🐱</span><span class="sticker">🙏</span><span class="sticker">👏</span><span class="sticker">😭</span><span class="sticker">🤔</span><span class="sticker">💀</span><span class="sticker">🥹</span>
            </div>`:'<div style="padding:10px;text-align:center;font-size:12px;color:var(--text2);">Только администраторы могут писать</div>'}
        </div>`;
    }

    const mainHtml=`
        <div class="panel ${activeChat?'hidden':''}">
            <div class="header">
                <span>ArMess</span>
                <span style="font-size:14px;color:var(--text2);">${currentUser.avatar} ${esc(currentUser.displayName)}</span>
            </div>
            <div class="scroll-area">${activeTab==='chats'?chatsListHtml:activeTab==='notice'?noticeHtml:showSettingsForChannel?settingsHtml:profileHtml}</div>
        </div>
        ${chatScreenHtml?`<div class="panel" style="position:absolute;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:10;">${chatScreenHtml}</div>`:''}
        <div class="tabbar ${activeChat?'hidden':''}">
            <div class="tab ${activeTab==='chats'?'active':''}" data-tab="chats"><div class="tab-icon">💬</div><span>Чаты</span></div>
            <div class="tab ${activeTab==='notice'?'active':''}" data-tab="notice"><div class="tab-icon">📌</div><span>Доска</span></div>
            <div class="tab ${activeTab==='profile'?'active':''}" data-tab="profile"><div class="tab-icon">👤</div><span>Профиль</span></div>
        </div>`;
    document.getElementById('app').innerHTML=mainHtml;

    // === СОБЫТИЯ ===
    if(!activeChat) {
        document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{activeTab=t.dataset.tab;showSettingsForChannel=null;render();}));
        document.getElementById('chatSearchInput')?.addEventListener('input',e=>{searchQuery=e.target.value;render();});
        document.querySelectorAll('.list-item[data-chat]').forEach(el=>el.addEventListener('click',()=>{
            activeChat=el.dataset.chat; replyingTo=null; chatSearchQuery=''; showChatSearch=false;
            const key=activeChat==='group'?'group':activeChat.startsWith('channel_')?`ch_${activeChat.split('_')[1]}`:activeChat.startsWith('ann_')?`ann_${activeChat.split('_')[1]}`:activeChat==='teacher'?getPrivateChatKey(currentUserId,26):activeChat==='private_1'?getPrivateChatKey(currentUserId,1):getPrivateChatKey(currentUserId,parseInt(activeChat.split('_')[1]));
            markRead(key); render();
        }));

        // Профиль
        document.getElementById('changeNameBtn')?.addEventListener('click',()=>{let n=prompt("Новое имя:",currentUser.displayName);if(n&&n.trim()){users.find(u=>u.id===currentUserId).displayName=n.trim();saveAll();render();}});
        document.getElementById('changeAvatarBtn')?.addEventListener('click',()=>{let e=prompt("Эмодзи:",currentUser.avatar);if(e){users.find(u=>u.id===currentUserId).avatar=e;saveAll();render();}});
        document.getElementById('changePinBtn')?.addEventListener('click',()=>{
            let old=prompt("Текущий PIN:");if(old===null)return;
            let nw=prompt("Новый PIN (4 цифры):");if(nw===null)return;
            if(changePin(currentUserId,old,nw))alert("PIN изменён!");else alert("Ошибка: неверный PIN или новый не 4 цифры");
        });
        document.getElementById('toggleDarkBtn')?.addEventListener('click',()=>{darkMode=!darkMode;document.body.classList.toggle('dark',darkMode);saveAll();render();});
        document.getElementById('createGroupBtn')?.addEventListener('click',()=>{
            let name=prompt("Название группы:");if(!name||!name.trim())return;
            let avatar=prompt("Эмодзи (например 📚):")||'📢';
            let desc=prompt("Описание (можно пропустить):")||'';
            createChannel(name.trim(),currentUserId,avatar,undefined,desc);render();
        });
        document.getElementById('joinGroupBtn')?.addEventListener('click',()=>{
            let code=prompt("Код приглашения:");if(!code)return;
            if(joinChannelByCode(code,currentUserId)) { alert("Вы вступили!"); render(); }
            else { let ok=subscribeAnnouncement(code,currentUserId); if(ok){alert("Подписались на канал!");render();}else alert("Неверный код"); }
        });
        document.getElementById('createAnnBtn')?.addEventListener('click',()=>{
            let name=prompt("Название канала:");if(!name||!name.trim())return;
            let avatar=prompt("Эмодзи:")||'📡';
            let desc=prompt("Описание:")||'';
            createAnnouncement(name.trim(),currentUserId,avatar,desc);render();
        });
        document.getElementById('subAnnBtn')?.addEventListener('click',()=>{
            let code=prompt("Код канала:");if(!code)return;
            if(subscribeAnnouncement(code,currentUserId)){alert("Подписались!");render();}else alert("Неверный код");
        });
        document.getElementById('logoutBtn')?.addEventListener('click',()=>{
            if(confirm("Выйти из аккаунта?")) { currentUserId=null;loginSelectedUser=null;loginPinInput='';saveAll();renderLoginScreen(); }
        });

        if(isAdmin(currentUserId)) {
            document.getElementById('manageAdminsBtn')?.addEventListener('click',()=>{
                let list=users.filter(u=>u.id!==1).map(u=>`${u.id}: ${u.displayName}${admins.includes(u.id)?' (админ)':''}`).join('\n');
                let id=prompt("ID для назначения/снятия:\n"+list);
                if(id){let uid2=parseInt(id);if(admins.includes(uid2))admins=admins.filter(a=>a!==uid2);else admins.push(uid2);saveAll();render();}
            });
            document.getElementById('showLogBtn')?.addEventListener('click',()=>{
                const last=actionLog.slice(-30).reverse();
                alert(last.map(l=>`${new Date(l.ts).toLocaleString()} — ${l.userName}: ${l.action}`).join('\n')||'Лог пуст');
            });
            document.querySelectorAll('.session-kick').forEach(btn=>btn.addEventListener('click',()=>{closeSession(btn.dataset.sid);render();}));
        }
        document.getElementById('editNoticeBtn')?.addEventListener('click',()=>{let t=prompt("Текст доски:",noticeBoardText);if(t!==null){noticeBoardText=t;saveAll();render();}});

        // Настройки группы
        document.getElementById('closeSettingsBtn')?.addEventListener('click',()=>{showSettingsForChannel=null;render();});
        document.querySelectorAll('.color-swatch').forEach(sw=>sw.addEventListener('click',()=>{
            document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('selected'));
            sw.classList.add('selected');
        }));
        document.getElementById('saveGroupSettingsBtn')?.addEventListener('click',()=>{
            const name=document.getElementById('groupNameInput')?.value;
            const avatar=document.getElementById('groupAvatarInput')?.value;
            const desc=document.getElementById('groupDescInput')?.value;
            const selectedColor=document.querySelector('.color-swatch.selected')?.dataset.color;
            const isReadOnly=document.getElementById('readOnlyToggle')?.checked;
            if(showSettingsForChannel) updateChannel(showSettingsForChannel,{name:name||undefined,avatar:avatar||undefined,description:desc,color:selectedColor||undefined,isReadOnly});
            showSettingsForChannel=null;render();
        });
    } else {
        // === В чате ===
        const chatKey=activeChat==='group'?'group':activeChat.startsWith('channel_')?`ch_${currentChannelId}`:activeChat.startsWith('ann_')?`ann_${currentAnnId}`:activeChat==='teacher'?getPrivateChatKey(currentUserId,26):activeChat==='private_1'?getPrivateChatKey(currentUserId,1):getPrivateChatKey(currentUserId,parseInt(activeChat.split('_')[1]));

        document.getElementById('closeChatBtn')?.addEventListener('click',()=>{activeChat=null;replyingTo=null;showChatSearch=false;chatSearchQuery='';render();});
        document.getElementById('cancelReplyBtn')?.addEventListener('click',()=>{replyingTo=null;render();});
        document.getElementById('searchInChatBtn')?.addEventListener('click',()=>{showChatSearch=!showChatSearch;chatSearchQuery='';render();});
        document.getElementById('chatSearchInput2')?.addEventListener('input',e=>{chatSearchQuery=e.target.value;render();});
        document.getElementById('exportChatBtn')?.addEventListener('click',()=>{
            let title=activeChat==='group'?'Общий чат':activeChat==='teacher'?'Наталья_Львовна':activeChat==='private_1'?'Артур':activeChat.startsWith('user_')?getUser(parseInt(activeChat.split('_')[1]))?.displayName:channels.find(c=>c.id==currentChannelId)?.name||'Чат';
            exportChat(currentMessages,title);
        });
        document.getElementById('chatNameBtn')?.addEventListener('click',()=>{
            if(currentChannelId||currentAnnId){showSettingsForChannel=currentChannelId||currentAnnId;activeChat=null;render();}
        });
        document.getElementById('showGroupInfoBtn')?.addEventListener('click',()=>{showSettingsForChannel=currentChannelId||currentAnnId;activeChat=null;render();});

        const inputEl=document.getElementById('chatInput');
        const sendBtn=document.getElementById('sendChatBtn');
        const stickerBtn=document.getElementById('stickerBtn');
        const stickerPanel=document.getElementById('stickerPanel');

        stickerBtn?.addEventListener('click',()=>{ stickerPanel.style.display=stickerPanel.style.display==='none'?'flex':'none'; });
        document.querySelectorAll('.sticker').forEach(st=>st.addEventListener('click',()=>{ if(inputEl)inputEl.value+=st.innerText; stickerPanel.style.display='none'; inputEl?.focus(); }));

        // Typing indicator
        let typingTimer;
        inputEl?.addEventListener('input',()=>{
            setTyping(chatKey);
            clearTimeout(typingTimer);
            typingTimer=setTimeout(()=>{ const ind=document.getElementById('typingIndicator'); if(ind){const t=getTyping(chatKey);ind.textContent=t.length?`${t.join(', ')} печатает...`:'';}},500);
        });

        const sendMessage=()=>{
            let text=inputEl?.value.trim();
            if(!text) return;
            if(text.length>2000){alert("Максимум 2000 символов");return;}
            const reply=replyingTo?{...replyingTo}:null;
            if(activeChat==='group') addGroupMessage(text,currentUserId,getUser(currentUserId).displayName,reply);
            else if(activeChat==='teacher') addPrivateMessage(26,currentUserId,getUser(currentUserId).displayName,text,reply);
            else if(activeChat==='private_1') addPrivateMessage(1,currentUserId,getUser(currentUserId).displayName,text,reply);
            else if(activeChat.startsWith('user_')) addPrivateMessage(parseInt(activeChat.split('_')[1]),currentUserId,getUser(currentUserId).displayName,text,reply);
            else if(activeChat.startsWith('channel_')) addChannelMessage(currentChannelId,text,currentUserId,getUser(currentUserId).displayName,reply);
            else if(activeChat.startsWith('ann_')) addAnnouncementPost(currentAnnId,text,currentUserId);
            if(inputEl) inputEl.value='';
            replyingTo=null;
            markRead(chatKey);
            render();
        };
        sendBtn?.addEventListener('click',sendMessage);
        inputEl?.addEventListener('keypress',e=>{if(e.key==='Enter')sendMessage();});

        // Ответить на сообщение
        document.querySelectorAll('.reply-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                const msgDiv=btn.closest('.message');
                const msgId=parseFloat(msgDiv.dataset.msgId);
                const msg=currentMessages.find(m=>m.id==msgId);
                if(msg) { replyingTo={msgId:msg.id,text:msg.text,userName:msg.userName||msg.fromName||getUser(msg.userId)?.displayName}; render(); document.getElementById('chatInput')?.focus(); }
            });
        });

        // Реакции
        const REACTION_EMOJIS=['👍','❤️','😂','😮','😢','🔥','👏','🎉'];
        document.querySelectorAll('.react-btn').forEach(btn=>{
            btn.addEventListener('click',e=>{
                e.stopPropagation();
                const msgDiv=btn.closest('.message');
                const msgId=parseFloat(msgDiv.dataset.msgId);
                // mini picker
                const old=document.getElementById('reactionPicker');
                if(old) old.remove();
                const picker=document.createElement('div');
                picker.id='reactionPicker';
                picker.style.cssText='position:fixed;z-index:9999;background:var(--bg2);border-radius:20px;padding:6px 10px;display:flex;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,0.2);';
                picker.innerHTML=REACTION_EMOJIS.map(em=>`<span style="font-size:22px;cursor:pointer;" data-em="${em}">${em}</span>`).join('');
                const rect=btn.getBoundingClientRect();
                picker.style.left=Math.min(rect.left,window.innerWidth-200)+'px';
                picker.style.top=(rect.top-50)+'px';
                document.body.appendChild(picker);
                picker.querySelectorAll('span').forEach(sp=>sp.addEventListener('click',()=>{
                    const em=sp.dataset.em;
                    if(activeChat==='group') toggleGroupReaction(msgId,em);
                    else if(activeChat.startsWith('channel_')) toggleChannelReaction(currentChannelId,msgId,em);
                    else if(activeChat.startsWith('ann_')) toggleAnnReaction(currentAnnId,msgId,em);
                    else { const toId=activeChat==='teacher'?26:activeChat==='private_1'?1:parseInt(activeChat.split('_')[1]); togglePrivateReaction(toId,msgId,em); }
                    picker.remove(); render();
                }));
                setTimeout(()=>document.addEventListener('click',()=>picker.remove(),{once:true}),10);
            });
        });

        // Клик на существующую реакцию
        document.querySelectorAll('.reaction-chip').forEach(chip=>{
            chip.addEventListener('click',()=>{
                const em=chip.dataset.reactEmoji;
                const msgId=parseFloat(chip.dataset.reactMsg);
                if(activeChat==='group') toggleGroupReaction(msgId,em);
                else if(activeChat.startsWith('channel_')) toggleChannelReaction(currentChannelId,msgId,em);
                else if(activeChat.startsWith('ann_')) toggleAnnReaction(currentAnnId,msgId,em);
                else { const toId=activeChat==='teacher'?26:activeChat==='private_1'?1:parseInt(activeChat.split('_')[1]); togglePrivateReaction(toId,msgId,em); }
                render();
            });
        });

        // Редактировать
        document.querySelectorAll('.edit-msg').forEach(btn=>{
            btn.addEventListener('click',()=>{
                const msgDiv=btn.closest('.message');
                const msgId=parseFloat(msgDiv.dataset.msgId);
                const msg=currentMessages.find(m=>m.id==msgId);
                const newText=prompt("Новый текст:",msg?.text);
                if(newText&&newText.trim()) {
                    if(activeChat==='group') editGroupMessage(msgId,newText,currentUserId);
                    else if(activeChat.startsWith('channel_')) editChannelMessage(currentChannelId,msgId,newText,currentUserId);
                    else { const toId=activeChat==='teacher'?26:activeChat==='private_1'?1:parseInt(activeChat.split('_')[1]); editPrivateMessage(toId,msgId,newText,currentUserId); }
                    render();
                }
            });
        });

        // Удалить
        document.querySelectorAll('.delete-msg').forEach(btn=>{
            btn.addEventListener('click',()=>{
                const msgDiv=btn.closest('.message');
                const msgId=parseFloat(msgDiv.dataset.msgId);
                if(confirm("Удалить сообщение?")) {
                    if(activeChat==='group') deleteGroupMessage(msgId,currentUserId);
                    else if(activeChat.startsWith('channel_')) deleteChannelMessage(currentChannelId,msgId,currentUserId);
                    else { const toId=activeChat==='teacher'?26:activeChat==='private_1'?1:parseInt(activeChat.split('_')[1]); deletePrivateMessage(toId,msgId,currentUserId); }
                    render();
                }
            });
        });

        // Закрепить
        document.querySelectorAll('.pin-msg').forEach(btn=>{
            btn.addEventListener('click',()=>{
                const msgDiv=btn.closest('.message');
                const msgId=parseFloat(msgDiv.dataset.msgId);
                if(currentChannelId) {
                    const ch=channels.find(c=>c.id==currentChannelId);
                    if(ch) { ch.pinnedMsgId=ch.pinnedMsgId==msgId?null:msgId; saveAll(); render(); }
                } else if(activeChat==='group') {
                    // закреп для группового чата через глобальную переменную
                    if(!groupMessages._pinned) groupMessages._pinned=null;
                    // просто сохраним в localStorage отдельно
                    localStorage.setItem('armess2_group_pin',ch=>msgId);
                }
            });
        });

        const area=document.getElementById('chatMessagesArea');
        if(area) { area.scrollTop=area.scrollHeight; }
    }
}

// ===== ЭКРАН ВХОДА =====
function renderLoginScreen() {
    if(loginSelectedUser===null) {
        let usersHtml=users.map(u=>`<div class="list-item" data-id="${u.id}"><div class="avatar" style="background:var(--accent);">${u.avatar}</div><div class="info"><div class="name">${esc(u.displayName)}</div></div></div>`).join('');
        document.getElementById('app').innerHTML=`<div class="panel"><div class="header"><span>ArMess</span></div><div class="scroll-area">${usersHtml}</div></div>`;
        document.querySelectorAll('.list-item').forEach(el=>el.addEventListener('click',()=>{loginSelectedUser=parseInt(el.dataset.id);loginPinInput='';renderLoginScreen();}));
    } else {
        const user=getUser(loginSelectedUser);
        const fails=getFails(), rec=fails[String(loginSelectedUser)]||{count:0,until:0};
        const isLocked=rec.until>Date.now();
        const dots='●'.repeat(loginPinInput.length)+'○'.repeat(4-loginPinInput.length);
        document.getElementById('app').innerHTML=`<div class="panel">
            <div class="header">
                <span style="font-size:20px;cursor:pointer;" id="pinBackBtn">←</span>
                <span>Вход</span><span style="opacity:0;">←</span>
            </div>
            <div style="display:flex;flex-direction:column;align-items:center;padding:32px 24px;gap:16px;">
                <div class="big-avatar" style="width:64px;height:64px;font-size:32px;">${user.avatar}</div>
                <div style="font-weight:700;font-size:18px;color:var(--text);">${esc(user.displayName)}</div>
                <div style="font-size:32px;letter-spacing:14px;margin:8px 0;">${dots}</div>
                ${isLocked?`<div style="color:var(--red);font-size:13px;">🔒 Подождите ${Math.ceil((rec.until-Date.now())/1000)} сек.</div>`:''}
                <div id="pinError" style="color:var(--red);font-size:13px;min-height:18px;"></div>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:260px;">
                    ${[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map(k=>`<button class="pin-key" data-key="${k}" style="padding:18px;font-size:22px;border:none;background:var(--bg3);color:var(--text);border-radius:50%;cursor:pointer;${k===''?'visibility:hidden;':''}${k==='⌫'?'background:var(--bg);':''}">${k}</button>`).join('')}
                </div>
            </div>
        </div>`;
        document.getElementById('pinBackBtn').addEventListener('click',()=>{loginSelectedUser=null;loginPinInput='';renderLoginScreen();});
        document.querySelectorAll('.pin-key').forEach(btn=>btn.addEventListener('click',()=>{
            const key=btn.dataset.key;
            if(key==='⌫') { loginPinInput=loginPinInput.slice(0,-1); renderLoginScreen(); }
            else if(key!==''&&loginPinInput.length<4) {
                loginPinInput+=key;
                if(loginPinInput.length===4) {
                    const res=checkPin(loginSelectedUser,loginPinInput);
                    if(res.ok) {
                        currentUserId=loginSelectedUser; loginSelectedUser=null; loginPinInput='';
                        registerSession(); saveAll(); activeTab='chats'; activeChat=null; render();
                    } else if(res.locked) { loginPinInput=''; renderLoginScreen(); }
                    else {
                        loginPinInput=''; renderLoginScreen();
                        setTimeout(()=>{ const e=document.getElementById('pinError'); if(e) e.textContent=`Неверный PIN. Попыток: ${res.attemptsLeft}`; },10);
                    }
                } else renderLoginScreen();
            }
        }));
    }
}

// ===== СТАРТ =====
loadAll();
if(currentUserId&&getUser(currentUserId)) { activeTab='chats'; activeChat=null; render(); }
else { currentUserId=null; renderLoginScreen(); }

// Обновление онлайн-статуса
setInterval(()=>{ if(currentUserId){ registerSession(); const ind=document.getElementById('typingIndicator'); if(ind&&activeChat){ const chatKey=activeChat==='group'?'group':activeChat.startsWith('channel_')?`ch_${activeChat.split('_')[1]}`:activeChat.startsWith('ann_')?`ann_${activeChat.split('_')[1]}`:activeChat==='teacher'?getPrivateChatKey(currentUserId,26):activeChat==='private_1'?getPrivateChatKey(currentUserId,1):getPrivateChatKey(currentUserId,parseInt(activeChat.split('_')[1])); const t=getTyping(chatKey); ind.textContent=t.length?`${t.join(', ')} печатает...`:''; } } }, 3000);
</script>
