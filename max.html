<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чат | Реальные сессии + Каналы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Телефон-контейнер — теперь без фиксированной высоты, чтобы влезало */
        .phone {
            width: 100%;
            max-width: 500px;
            height: 100%;
            max-height: 900px;
            background: #ffffff;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .panel {
            flex: 1;
            overflow-y: auto;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }

        .hidden { display: none !important; }

        .header {
            padding: 14px 16px 10px;
            background: #ffffff;
            border-bottom: 0.5px solid #e0e0e0;
            font-weight: 600;
            font-size: 22px;
            color: #000;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-shrink: 0;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: white;
            border-bottom: 0.5px solid #efefef;
            cursor: pointer;
            transition: 0.1s;
        }
        .list-item:active { background: #f0f0f0; }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #8e8e93;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 500;
            color: white;
            flex-shrink: 0;
        }

        .info { flex: 1; min-width: 0; }
        .name { font-weight: 500; font-size: 16px; margin-bottom: 4px; }
        .preview { font-size: 13px; color: #6c6c70; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .chat-view {
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #f5f5f5;
        }
        .chat-header {
            padding: 12px 16px;
            background: white;
            border-bottom: 0.5px solid #dbdbdb;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .back-btn { font-size: 28px; cursor: pointer; color: #007aff; line-height: 1; }
        .chat-name { font-weight: 600; font-size: 17px; }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }
        .message-mine { align-self: flex-end; }
        .message-other { align-self: flex-start; }
        .bubble {
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 15px;
            word-wrap: break-word;
        }
        .message-mine .bubble { background: #007aff; color: white; border-bottom-right-radius: 4px; }
        .message-other .bubble { background: #e5e5ea; color: black; border-bottom-left-radius: 4px; }
        .msg-name { font-size: 11px; font-weight: 500; margin-bottom: 2px; margin-left: 8px; color: #3a3a3c; }
        .msg-time { font-size: 9px; color: #8e8e93; margin-top: 3px; margin-left: 10px; }
        
        .input-bar {
            background: white;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            border-top: 0.5px solid #dbdbdb;
            flex-shrink: 0;
        }
        .input-bar input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 30px;
            border: none;
            background: #f0f0f0;
            font-size: 15px;
            outline: none;
        }
        .input-bar button {
            background: #007aff;
            border: none;
            color: white;
            width: 44px;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
        }

        .tabbar {
            display: flex;
            background: #ffffff;
            border-top: 0.5px solid #dbdbdb;
            padding: 6px 16px 10px;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 10px;
            color: #8e8e93;
            cursor: pointer;
            flex: 1;
        }
        .tab.active { color: #007aff; }
        .tab-icon { font-size: 22px; }

        .profile-item {
            background: white;
            margin: 12px;
            padding: 14px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .big-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #007aff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .edit-btn {
            background: #e9e9ef;
            padding: 8px 14px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
            margin: 6px 12px;
        }
        .session-item {
            background: white;
            margin: 6px 12px;
            padding: 10px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .session-info { font-size: 12px; flex: 1; word-break: break-word; }
        .session-kick { background: #ff3b30; color: white; border: none; padding: 5px 12px; border-radius: 20px; cursor: pointer; font-size: 12px; }
        .notice-board {
            background: white;
            margin: 12px;
            padding: 16px;
            border-radius: 24px;
            text-align: center;
        }
        .notice-text {
            font-size: 15px;
            margin: 10px 0;
            white-space: pre-wrap;
            background: #f8f9fc;
            padding: 12px;
            border-radius: 18px;
            text-align: left;
        }
        .channel-item { display: flex; justify-content: space-between; align-items: center; }
        .create-btn { background: #34c759; margin: 6px 12px; text-align: center; color: white; }
        .contact-note { padding: 16px; color: gray; text-align: center; font-size: 13px; }
        hr { margin: 6px 0; }
        .scroll-area { flex: 1; overflow-y: auto; }
    </style>
</head>
<body>
<div class="phone" id="app"></div>

<script>
    // ---------- БАЗА ПОЛЬЗОВАТЕЛЕЙ (26) ----------
    const RAW_USERS = [
        { id: 1, name: "Артур", role: "creator", displayName: "Артур", avatar: "👑" },
        { id: 2, name: "Маша Петрова", role: "user", displayName: "Маша Петрова", avatar: "🌸" },
        { id: 3, name: "Маша Старцева", role: "user", displayName: "Маша Старцева", avatar: "🍒" },
        { id: 4, name: "Никифоров Матвей", role: "user", displayName: "Никифоров Матвей", avatar: "⚡" },
        { id: 5, name: "Арина Хайдукова", role: "user", displayName: "Арина Хайдукова", avatar: "🎀" },
        { id: 6, name: "Городилова Варя", role: "user", displayName: "Городилова Варя", avatar: "🌼" },
        { id: 7, name: "Артем Мерзляков", role: "user", displayName: "Артем Мерзляков", avatar: "🎧" },
        { id: 8, name: "Вика Батуева", role: "user", displayName: "Вика Батуева", avatar: "🐱" },
        { id: 9, name: "Саша Скворцов", role: "user", displayName: "Саша Скворцов", avatar: "💻" },
        { id: 10, name: "Кирилл Зяблицев", role: "user", displayName: "Кирилл Зяблицев", avatar: "🎸" },
        { id: 11, name: "Попов Тимофей", role: "user", displayName: "Попов Тимофей", avatar: "🏀" },
        { id: 12, name: "Ваня", role: "user", displayName: "Ваня", avatar: "🧸" },
        { id: 13, name: "Юля Ситнюк", role: "user", displayName: "Юля Ситнюк", avatar: "✨" },
        { id: 14, name: "Варя Косякова", role: "user", displayName: "Варя Косякова", avatar: "🦋" },
        { id: 15, name: "Рома отличник", role: "user", displayName: "Рома отличник", avatar: "📖" },
        { id: 16, name: "Лиля Харламова", role: "user", displayName: "Лиля Харламова", avatar: "🎨" },
        { id: 17, name: "Юля Бабушкина", role: "user", displayName: "Юля Бабушкина", avatar: "🍭" },
        { id: 18, name: "Кристина", role: "user", displayName: "Кристина", avatar: "💎" },
        { id: 19, name: "Саша сычугов", role: "user", displayName: "Саша сычугов", avatar: "⚙️" },
        { id: 20, name: "Егор", role: "user", displayName: "Егор", avatar: "🔥" },
        { id: 21, name: "Никита Курзов", role: "user", displayName: "Никита Курзов", avatar: "🎮" },
        { id: 22, name: "Варя Акулова", role: "user", displayName: "Варя Акулова", avatar: "🐰" },
        { id: 23, name: "Диляра", role: "user", displayName: "Диляра", avatar: "🌙" },
        { id: 24, name: "Соня Саблина", role: "user", displayName: "Соня Саблина", avatar: "⭐" },
        { id: 25, name: "Софа Шляпникова", role: "user", displayName: "Софа Шляпникова", avatar: "👒" },
        { id: 26, name: "Наталья Львовна", role: "teacher", displayName: "Наталья Львовна", avatar: "📐" }
    ];

    let users = JSON.parse(JSON.stringify(RAW_USERS));
    let currentUserId = null;
    let currentSessionId = null;
    let groupMessages = [];
    let privateMessages = {};
    let channels = [];
    let logoutRequests = [];
    let sessions = [];
    let noticeBoardText = "📢 Добро пожаловать!\nЗдесь будет висеть актуальное расписание или объявление.";

    let activeTab = "chats";
    let activeChat = null;

    const STORAGE_KEYS = {
        USERS: "real_users",
        GROUP: "real_group",
        PRIVATE: "real_private",
        CHANNELS: "real_channels",
        REQUESTS: "real_requests",
        SESSIONS: "real_sessions",
        NOTICE: "real_notice",
        CURRENT_USER: "real_current_user",
        CURRENT_SESSION: "real_current_session"
    };

    function saveAll() {
        localStorage.setItem(STORAGE_KEYS.USERS, JSON.stringify(users));
        localStorage.setItem(STORAGE_KEYS.GROUP, JSON.stringify(groupMessages));
        localStorage.setItem(STORAGE_KEYS.PRIVATE, JSON.stringify(privateMessages));
        localStorage.setItem(STORAGE_KEYS.CHANNELS, JSON.stringify(channels));
        localStorage.setItem(STORAGE_KEYS.REQUESTS, JSON.stringify(logoutRequests));
        localStorage.setItem(STORAGE_KEYS.SESSIONS, JSON.stringify(sessions));
        localStorage.setItem(STORAGE_KEYS.NOTICE, noticeBoardText);
        if(currentUserId) localStorage.setItem(STORAGE_KEYS.CURRENT_USER, JSON.stringify({ id: currentUserId }));
        else localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
        if(currentSessionId) localStorage.setItem(STORAGE_KEYS.CURRENT_SESSION, currentSessionId);
        else localStorage.removeItem(STORAGE_KEYS.CURRENT_SESSION);
    }

    function loadAll() {
        users = JSON.parse(localStorage.getItem(STORAGE_KEYS.USERS) || JSON.stringify(RAW_USERS));
        groupMessages = JSON.parse(localStorage.getItem(STORAGE_KEYS.GROUP) || JSON.stringify([{ id: Date.now(), text: "Общий чат. Создавайте группы и общайтесь!", userId: 1, userName: "Артур", timestamp: Date.now()-3600000 }]));
        privateMessages = JSON.parse(localStorage.getItem(STORAGE_KEYS.PRIVATE) || "{}");
        channels = JSON.parse(localStorage.getItem(STORAGE_KEYS.CHANNELS) || "[]");
        logoutRequests = JSON.parse(localStorage.getItem(STORAGE_KEYS.REQUESTS) || "[]");
        sessions = JSON.parse(localStorage.getItem(STORAGE_KEYS.SESSIONS) || "[]");
        noticeBoardText = localStorage.getItem(STORAGE_KEYS.NOTICE) || "📢 Добро пожаловать!\nЗдесь будет висеть актуальное расписание или объявление.";
        const curUser = localStorage.getItem(STORAGE_KEYS.CURRENT_USER);
        if(curUser) { try { currentUserId = JSON.parse(curUser).id; } catch(e) { currentUserId = null; } }
        currentSessionId = localStorage.getItem(STORAGE_KEYS.CURRENT_SESSION);
        if(!currentSessionId) {
            currentSessionId = 'sid_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem(STORAGE_KEYS.CURRENT_SESSION, currentSessionId);
        }
    }

    function generateSessionId() { return 'sid_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8); }

    async function getDeviceInfo() {
        const ua = navigator.userAgent;
        let device = 'Неизвестное устройство';
        if (/iPhone/i.test(ua)) device = 'iPhone';
        else if (/iPad/i.test(ua)) device = 'iPad';
        else if (/Android/i.test(ua)) device = 'Android';
        else if (/Windows/i.test(ua)) device = 'Windows PC';
        else if (/Mac/i.test(ua)) device = 'Mac';
        return `${device} · ${navigator.platform || 'unknown'}`;
    }

    async function getLocation() {
        return new Promise((resolve) => {
            if (!navigator.geolocation) { resolve('Геолокация недоступна'); return; }
            navigator.geolocation.getCurrentPosition(
                (pos) => resolve(`${pos.coords.latitude.toFixed(2)}, ${pos.coords.longitude.toFixed(2)}`),
                () => resolve('❌ Доступ запрещён')
            );
        });
    }

    async function registerOrUpdateSession(userId, userName) {
        const deviceInfo = await getDeviceInfo();
        const location = await getLocation();
        const existingIndex = sessions.findIndex(s => s.sessionId === currentSessionId);
        const sessionData = { sessionId: currentSessionId, userId, userName, deviceInfo, location, lastSeen: Date.now(), isActive: true };
        if (existingIndex !== -1) sessions[existingIndex] = sessionData;
        else sessions.push(sessionData);
        saveAll();
    }

    function isSessionValid() {
        const session = sessions.find(s => s.sessionId === currentSessionId);
        if (!session || session.isActive === false) {
            currentUserId = null;
            localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
            saveAll();
            return false;
        }
        return true;
    }

    function closeSession(sessionId) {
        const idx = sessions.findIndex(s => s.sessionId === sessionId);
        if (idx !== -1) { sessions[idx].isActive = false; saveAll(); }
        if (sessionId === currentSessionId) {
            currentUserId = null;
            localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
            saveAll();
        }
    }

    function getUser(id) { return users.find(u => u.id === id); }
    
    function addGroupMessage(text, userId, userName) {
        if(!text.trim()) return;
        groupMessages.push({ id: Date.now()+Math.random(), text: text.trim(), userId, userName, timestamp: Date.now() });
        if(groupMessages.length > 500) groupMessages = groupMessages.slice(-500);
        saveAll();
    }
    
    function addPrivateMessage(toId, fromId, fromName, text) {
        if(!text.trim()) return;
        if(!privateMessages[toId]) privateMessages[toId] = [];
        privateMessages[toId].push({ id: Date.now()+Math.random(), text: text.trim(), fromId, fromName, timestamp: Date.now() });
        saveAll();
    }
    
    function addChannelMessage(channelId, text, userId, userName) {
        const ch = channels.find(c => c.id == channelId);
        if(ch && text.trim()) {
            ch.messages.push({ id: Date.now()+Math.random(), text: text.trim(), userId, userName, timestamp: Date.now() });
            saveAll();
        }
    }
    
    function createChannel(name, creatorId, creatorName) {
        const newId = Date.now() + Math.random();
        channels.push({ id: newId, name, creatorId, creatorName, messages: [] });
        saveAll();
        return newId;
    }

    function deleteChannel(channelId) {
        channels = channels.filter(c => c.id != channelId);
        saveAll();
    }

    function getPrivateChat(userA, userB) {
        if(userA === 1 || userB === 1) {
            const other = userA === 1 ? userB : userA;
            const toArthur = privateMessages[1]?.filter(m => m.fromId === other) || [];
            const fromArthur = privateMessages[other] || [];
            return [...toArthur, ...fromArthur].sort((a,b)=>a.timestamp-b.timestamp);
        }
        return [];
    }
    
    function requestLogout(userId) {
        if(logoutRequests.some(r => r.userId === userId)) return false;
        logoutRequests.push({ userId, userName: getUser(userId).displayName, timestamp: Date.now() });
        saveAll();
        return true;
    }
    
    function approveLogout(userId) {
        logoutRequests = logoutRequests.filter(r => r.userId !== userId);
        saveAll();
        if(currentUserId === userId) {
            currentUserId = null;
            localStorage.removeItem(STORAGE_KEYS.CURRENT_USER);
            saveAll();
            return true;
        }
        return false;
    }
    
    function editNotice(newText) { noticeBoardText = newText; saveAll(); }

    async function render() {
        if(!currentUserId) { renderLoginScreen(); return; }
        if(!isSessionValid()) { renderLoginScreen(); return; }
        const currentUser = getUser(currentUserId);
        if(!currentUser) { renderLoginScreen(); return; }
        const isArthur = (currentUserId === 1);
        await registerOrUpdateSession(currentUserId, currentUser.displayName);
        
        // Список чатов
        let chatsListHtml = '';
        let lastGroupMsg = groupMessages.length ? groupMessages[groupMessages.length-1].text : '';
        chatsListHtml += `<div class="list-item" data-chat="group"><div class="avatar" style="background:#34c759;">👥</div><div class="info"><div class="name">Общий чат</div><div class="preview">${escapeHtml(lastGroupMsg.slice(0,50))}</div></div></div>`;
        if(!isArthur) {
            let privMsgs = getPrivateChat(currentUserId, 1);
            let lastMsg = privMsgs.length ? privMsgs[privMsgs.length-1].text : "Напишите Артуру";
            chatsListHtml += `<div class="list-item" data-chat="private_1"><div class="avatar" style="background:#ff9f0a;">👨‍💻</div><div class="info"><div class="name">Артур</div><div class="preview">${escapeHtml(lastMsg.slice(0,50))}</div></div></div>`;
        }
        channels.forEach(ch => {
            let lastMsg = ch.messages.length ? ch.messages[ch.messages.length-1].text : "Нет сообщений";
            chatsListHtml += `<div class="list-item" data-chat="channel_${ch.id}"><div class="avatar" style="background:#5856d6;">#️⃣</div><div class="info"><div class="name">${escapeHtml(ch.name)}</div><div class="preview">${escapeHtml(lastMsg.slice(0,50))}</div></div></div>`;
        });
        
        // Контакты
        let contactsHtml = '';
        users.forEach(user => {
            if(user.id === currentUserId) return;
            contactsHtml += `<div class="list-item" data-contact="${user.id}"><div class="avatar" style="background:#007aff;">${user.avatar}</div><div class="info"><div class="name">${escapeHtml(user.displayName)}</div></div></div>`;
        });
        
        // Доска
        let noticeHtml = `<div class="notice-board"><div style="font-weight:600; font-size:17px;">📌 Школьная доска</div><div class="notice-text">${escapeHtml(noticeBoardText).replace(/\n/g, '<br>')}</div>${isArthur ? `<div class="edit-btn" id="editNoticeBtn">✏️ Редактировать</div>` : ''}</div>`;
        
        // Профиль + сессии
        let profileHtml = `<div class="profile-item"><div class="big-avatar">${currentUser.avatar}</div><div><div style="font-weight:600; font-size:18px;">${escapeHtml(currentUser.displayName)}</div><div style="color:#8e8e93; font-size:12px;">${currentUser.role === 'creator' ? 'Создатель' : 'Участник'}</div></div></div>
        <div class="edit-btn" id="changeNameBtn">✏️ Изменить имя</div>
        <div class="edit-btn" id="changeAvatarBtn">🎨 Сменить эмодзи</div>`;
        
        if(isArthur) {
            const activeSessions = sessions.filter(s => s.isActive === true);
            let sessionsHtml = `<div style="margin:12px 12px 4px; font-weight:600;">🌐 Активные сессии</div>`;
            if(activeSessions.length === 0) sessionsHtml += `<div class="contact-note">Нет активных сессий</div>`;
            activeSessions.forEach(s => {
                const isCurrent = (s.sessionId === currentSessionId);
                sessionsHtml += `<div class="session-item"><div class="session-info"><b>${escapeHtml(s.userName)}</b> ${isCurrent ? '(это вы)' : ''}<br>📱 ${escapeHtml(s.deviceInfo)}<br>📍 ${escapeHtml(s.location)}<br>🕒 ${new Date(s.lastSeen).toLocaleString()}</div>${!isCurrent ? `<button class="session-kick" data-sid="${s.sessionId}">Закрыть</button>` : ''}</div>`;
            });
            profileHtml += `<div class="edit-btn create-btn" id="createChannelBtn">➕ Создать канал</div>`;
            channels.forEach(ch => {
                profileHtml += `<div class="session-item channel-item"><span>📢 ${escapeHtml(ch.name)}</span><button class="session-kick delete-channel" data-cid="${ch.id}" style="background:#ff9f0a;">Удалить</button></div>`;
            });
            profileHtml += sessionsHtml;
            if(logoutRequests.length > 0) {
                profileHtml += `<div style="margin:12px; background:#ffe5e5; border-radius:20px; padding:12px;"><b>⚠️ Запросы на выход:</b>`;
                logoutRequests.forEach(r => {
                    profileHtml += `<div style="display:flex; justify-content:space-between; margin-top:8px;"><span>${escapeHtml(r.userName)}</span><button class="approve-logout" data-id="${r.userId}" style="background:#ff3b30; border:none; color:white; padding:4px 12px; border-radius:20px;">Одобрить</button></div>`;
                });
                profileHtml += `</div>`;
            }
            profileHtml += `<div class="edit-btn" id="directLogoutBtn" style="background:#ff3b30; color:white;">🚪 Выйти</div>`;
        } else {
            profileHtml += `<div class="edit-btn logout-request" id="requestLogoutBtn">🚪 Запросить выход</div>`;
        }
        
        // Окно чата
        let chatScreenHtml = '';
        if(activeChat) {
            let chatTitle = '', messagesList = [], chatType = '', targetId = null;
            if(activeChat === 'group') { chatTitle = 'Общий чат'; messagesList = [...groupMessages].sort((a,b)=>a.timestamp-b.timestamp); chatType = 'group'; }
            else if(activeChat === 'private_1') { chatTitle = 'Артур'; messagesList = getPrivateChat(currentUserId, 1); chatType = 'private'; targetId = 1; }
            else if(activeChat.startsWith('channel_')) {
                let cid = parseInt(activeChat.split('_')[1]);
                let channel = channels.find(c => c.id === cid);
                if(channel) { chatTitle = channel.name; messagesList = [...channel.messages].sort((a,b)=>a.timestamp-b.timestamp); chatType = 'channel'; targetId = cid; }
                else activeChat = null;
            }
            if(chatTitle) {
                let messagesHtml = '';
                for(let msg of messagesList) {
                    let isMine = (msg.userId === currentUserId) || (msg.fromId === currentUserId);
                    let senderName = msg.userName || msg.fromName || getUser(msg.userId)?.displayName;
                    messagesHtml += `<div class="message ${isMine ? 'message-mine' : 'message-other'}">${!isMine ? `<div class="msg-name">${escapeHtml(senderName)}</div>` : ''}<div class="bubble">${escapeHtml(msg.text)}</div><div class="msg-time">${new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
                }
                chatScreenHtml = `<div class="chat-view"><div class="chat-header"><div class="back-btn" id="closeChatBtn">←</div><div class="chat-name">${escapeHtml(chatTitle)}</div></div><div class="messages-area" id="chatMessagesArea">${messagesHtml || '<div style="text-align:center;color:gray;">Нет сообщений</div>'}</div><div class="input-bar"><input type="text" id="chatInput" placeholder="Сообщение..."><button id="sendChatBtn">➤</button></div></div>`;
            }
        }
        
        const mainHtml = `<div class="panel ${activeChat ? 'hidden' : ''}"><div class="header"><span>${activeTab === 'chats' ? 'Чаты' : (activeTab === 'contacts' ? 'Контакты' : (activeTab === 'notice' ? 'Доска' : 'Профиль'))}</span></div><div class="scroll-area">${activeTab === 'chats' ? chatsListHtml : (activeTab === 'contacts' ? contactsHtml : (activeTab === 'notice' ? noticeHtml : profileHtml))}</div></div>${chatScreenHtml ? `<div class="panel" style="position:absolute; top:0; left:0; right:0; bottom:0; background: #f5f5f5; z-index:10;">${chatScreenHtml}</div>` : ''}<div class="tabbar ${activeChat ? 'hidden' : ''}"><div class="tab ${activeTab === 'chats' ? 'active' : ''}" data-tab="chats"><div class="tab-icon">💬</div><span>Чаты</span></div><div class="tab ${activeTab === 'contacts' ? 'active' : ''}" data-tab="contacts"><div class="tab-icon">👥</div><span>Контакты</span></div><div class="tab ${activeTab === 'notice' ? 'active' : ''}" data-tab="notice"><div class="tab-icon">📌</div><span>Доска</span></div><div class="tab ${activeTab === 'profile' ? 'active' : ''}" data-tab="profile"><div class="tab-icon">👤</div><span>Профиль</span></div></div>`;
        document.getElementById('app').innerHTML = mainHtml;
        
        if(!activeChat) {
            document.querySelectorAll('.tab').forEach(tab => { tab.addEventListener('click', () => { activeTab = tab.dataset.tab; activeChat = null; render(); }); });
            document.querySelectorAll('.list-item[data-chat]').forEach(el => { el.addEventListener('click', () => { activeChat = el.dataset.chat; render(); }); });
            document.querySelectorAll('.list-item[data-contact]').forEach(el => {
                el.addEventListener('click', () => { let uid = parseInt(el.dataset.contact); if(currentUserId !== 1 && uid !== 1) { alert("Личные чаты только с Артуром"); return; } if(uid === 1) activeChat = 'private_1'; else if(currentUserId === 1) activeChat = `private_${uid}`; render(); });
            });
            if(activeTab === 'profile') {
                document.getElementById('changeNameBtn')?.addEventListener('click', () => { let newName = prompt("Новое имя:", currentUser.displayName); if(newName) { users.find(u=>u.id===currentUserId).displayName = newName; saveAll(); render(); } });
                document.getElementById('changeAvatarBtn')?.addEventListener('click', () => { let emoji = prompt("Эмодзи для аватара:", currentUser.avatar); if(emoji) { users.find(u=>u.id===currentUserId).avatar = emoji; saveAll(); render(); } });
                if(isArthur) {
                    document.getElementById('createChannelBtn')?.addEventListener('click', () => { let name = prompt("Название канала:"); if(name) createChannel(name, currentUserId, currentUser.displayName); render(); });
                    document.querySelectorAll('.delete-channel').forEach(btn => { btn.addEventListener('click', (e) => { e.stopPropagation(); let cid = parseInt(btn.dataset.cid); deleteChannel(cid); render(); }); });
                    document.querySelectorAll('.session-kick').forEach(btn => { if(btn.classList.contains('delete-channel')) return; btn.addEventListener('click', () => { let sid = btn.dataset.sid; closeSession(sid); render(); }); });
                    document.querySelectorAll('.approve-logout').forEach(btn => { btn.addEventListener('click', () => { approveLogout(parseInt(btn.dataset.id)); render(); }); });
                    document.getElementById('directLogoutBtn')?.addEventListener('click', () => { if(confirm("Выйти из аккаунта?")) { currentUserId = null; localStorage.removeItem(STORAGE_KEYS.CURRENT_USER); saveAll(); render(); } });
                } else {
                    document.getElementById('requestLogoutBtn')?.addEventListener('click', () => { requestLogout(currentUserId); alert("Запрос отправлен Артуру"); render(); });
                }
            }
            if(activeTab === 'notice' && isArthur) {
                document.getElementById('editNoticeBtn')?.addEventListener('click', () => { let newText = prompt("Текст объявления:", noticeBoardText); if(newText) { editNotice(newText); render(); } });
            }
        } else {
            document.getElementById('closeChatBtn')?.addEventListener('click', () => { activeChat = null; render(); });
            const sendBtn = document.getElementById('sendChatBtn');
            const inputEl = document.getElementById('chatInput');
            const sendMessage = () => {
                let text = inputEl.value.trim();
                if(!text) return;
                if(activeChat === 'group') addGroupMessage(text, currentUserId, currentUser.displayName);
                else if(activeChat === 'private_1') addPrivateMessage(1, currentUserId, currentUser.displayName, text);
                else if(activeChat.startsWith('channel_')) { let cid = parseInt(activeChat.split('_')[1]); addChannelMessage(cid, text, currentUserId, currentUser.displayName); }
                inputEl.value = ''; render();
            };
            sendBtn?.addEventListener('click', sendMessage);
            inputEl?.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
            const area = document.getElementById('chatMessagesArea'); if(area) area.scrollTop = area.scrollHeight;
        }
    }
    
    function renderLoginScreen() {
        let usersHtml = '';
        users.forEach(user => { usersHtml += `<div class="list-item" data-id="${user.id}"><div class="avatar" style="background:#007aff;">${user.avatar}</div><div class="info"><div class="name">${escapeHtml(user.displayName)}</div></div></div>`; });
        const loginHtml = `<div class="panel"><div class="header"><span>Выберите аккаунт</span></div><div class="scroll-area">${usersHtml}</div></div>`;
        document.getElementById('app').innerHTML = loginHtml;
        document.querySelectorAll('.list-item').forEach(el => {
            el.addEventListener('click', async () => {
                let id = parseInt(el.dataset.id);
                if(id === 1 && !confirm('Войти как Артур? Управление сессиями')) return;
                currentUserId = id;
                await registerOrUpdateSession(id, getUser(id).displayName);
                saveAll();
                activeTab = 'chats'; activeChat = null;
                render();
            });
        });
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    
    loadAll();
    if(currentUserId && getUser(currentUserId)) { activeTab = 'chats'; activeChat = null; render(); } 
    else { currentUserId = null; renderLoginScreen(); }
</script>
</body>
</html>
